<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Concepts Visual Dataset</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <span class="logo">AICVD</span>
        <h1>AI Concepts Visual Dataset</h1>
      </div>
      <div class="header-right">
        <span class="badge badge-info" id="count-badge">24 entries</span>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="stats-row" id="stats-row"></section>

    <section class="toolbar">
      <input type="text" id="search" placeholder="Search by title, summary, or tag…" autocomplete="off" />
      <select id="cat-filter">
        <option value="">All categories</option>
        <option value="Foundations">Foundations</option>
        <option value="Architecture">Architecture</option>
        <option value="Training">Training</option>
        <option value="Alignment">Alignment</option>
        <option value="Inference">Inference</option>
      </select>
      <select id="label-filter">
        <option value="">All labels</option>
        <option value="good">Good design</option>
        <option value="bad">Bad design</option>
        <option value="pending">Pending</option>
      </select>
      <select id="sort-by">
        <option value="id">Sort: ID</option>
        <option value="title">Sort: Title A–Z</option>
        <option value="category">Sort: Category</option>
      </select>
    </section>

    <section class="grid" id="grid"></section>

    <aside class="detail-panel" id="detail-panel" aria-hidden="true">
      <div class="detail-inner" id="detail-inner"></div>
    </aside>
  </main>

  <footer class="footer">
    <span>AI Concepts Visual Dataset &nbsp;·&nbsp; Python · JSON · Canva</span>
    <a href="https://github.com" target="_blank" rel="noopener">GitHub ↗</a>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
